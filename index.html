<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Crypto Coin Catch</title>\n    <style>\n        body {\n            margin: 0;\n            overflow: hidden;\n            background: #282c34;\n            color: white;\n            font-family: Arial, sans-serif;\n        }\n        #gameCanvas {\n            display: block;\n            margin: auto;\n            background: #444;\n            border: 2px solid #fff;\n        }\n        #score {\n            position: absolute;\n            top: 10px;\n            left: 10px;\n            font-size: 20px;\n        }\n    </style>\n</head>\n<body>\n    <div id="score">Score: 0</div>\n    <canvas id="gameCanvas" width="400" height="600"></canvas>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        let player = { width: 50, height: 50, x: canvas.width / 2 - 25, y: canvas.height - 60 };\n        let coins = [];\n        let score = 0;\n        let gameOver = false;\n        let coinInterval;\n\n        function drawPlayer() {\n            ctx.fillStyle = 'blue';\n            ctx.fillRect(player.x, player.y, player.width, player.height);\n        }\n\n        function drawCoins() {\n            coins.forEach((coin) => {\n                ctx.fillStyle = 'gold';\n                ctx.fillRect(coin.x, coin.y, 30, 30);\n            });\n        }\n\n        function updateCoins() {\n            coins.forEach((coin, index) => {\n                coin.y += 2;\n                if (coin.y > canvas.height) {\n                    coins.splice(index, 1);\n                } else if (coin.y + 30 > player.y && coin.x < player.x + player.width && coin.x + 30 > player.x) {\n                    score++;\n                    coins.splice(index, 1);\n                }\n            });\n        }\n\n        function spawnCoin() {\n            const x = Math.random() * (canvas.width - 30);\n            coins.push({ x: x, y: 0 });\n        }\n\n        function gameLoop() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            drawPlayer();\n            drawCoins();\n            updateCoins();\n            document.getElementById('score').innerText = 'Score: ' + score;\n\n            if (gameOver) {\n                clearInterval(coinInterval);\n                ctx.fillStyle = 'red';\n                ctx.font = '30px Arial';\n                ctx.fillText('Game Over!', canvas.width / 2 - 70, canvas.height / 2);\n                return;\n            }\n            requestAnimationFrame(gameLoop);\n        }\n\n        window.addEventListener('keydown', (e) => {\n            if (e.key === 'ArrowLeft' && player.x > 0) {\n                player.x -= 20;\n            } else if (e.key === 'ArrowRight' && player.x < canvas.width - player.width) {\n                player.x += 20;\n            }\n        });\n\n        coinInterval = setInterval(spawnCoin, 1000);\n        gameLoop();\n    <\/script>\n</body>\n</html>\n
